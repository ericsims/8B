---
defaults:
  # Layout options
  unit_size: 0x1000
  unit_height: 0.325
  min_height: 0.675
  max_height: 3
  discontinuity_height: 0.625
  region_width: 1.5

  # Presentation options
  background: "#fff"
  fill: '#C7E3EC'
  outline: '#336DA5'

  # Address labels
  address_format: c
  size_format: si

automatic:
  discontinuities:
    fill: "#fff"
    style: dashed
  addresses:
    side: right
    start: true
    end: false
    size: false
    final_end: true
    end_exclusive: false

layout:
  0x0000:
    size: 0x4000
    label: "ROM"
    labels:
      "er,ic": "16 KiB"
      "el,ib": "TEXT"
    bank: true
    fill: '#D7D3EC'
    location: 1
  0x4000:
    size: 0x8000
    label: "RAM"
    labels:
      "er,ic": "32 KiB"
      "el,ib": "↑\nSTACK\nBSS"
    bank: true
    fill: "#C7F3DC"
    location: 2
  0xC000:
    size: 0x2002
    label: "EXRAM"
    labels:
      "er,ic": "8 KiB x 256\n(2 MiB)"
    location: 3
  0xE002:
    size: 0x0002
    label: "UART"
    location: 5
  0xE004:
    size: 0x0002
    label: "MOT"
    location: 6
  0xE010:
    size: 0x0008
    label: "SDCARD"
    location: 4
  0xE400:
    size: 0x400
    label: "ETH"
    location: 7
